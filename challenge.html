<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Challenge – AnimeHub</title>
  <link rel="icon" type="image/png" href="icon_animehub.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap');
    :root {
      --bg:#0b1220; --bg2:#061226;
      --card:rgba(13,22,40,0.88); --card-border:rgba(255,255,255,0.07);
      --accent:#06b6d4; --accent2:#3b82f6;
      --muted:#7e8fa8; --text:#e6eef6; --radius:16px;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'DM Sans',ui-sans-serif,system-ui;
      background:linear-gradient(160deg,var(--bg) 0%,var(--bg2) 100%);
      color:var(--text); min-height:100vh;
      -webkit-font-smoothing:antialiased; overflow-x:hidden;
    }
    canvas { position:fixed; top:0; left:0; z-index:0; opacity:.3; pointer-events:none; }
    header {
      position:sticky; top:0; z-index:100;
      background:rgba(11,18,32,.95); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--card-border);
      padding:14px 32px; display:flex; align-items:center; justify-content:space-between;
    }
    .logo-text {
      font-family:'Mochiy Pop One','Syne',sans-serif; font-size:1.4rem; cursor:pointer;
      background:linear-gradient(90deg,#fff59d,#ffeb3b,#ff9800,#ff5722);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .hbtn {
      padding:8px 14px; border-radius:10px;
      border:1px solid var(--card-border); background:rgba(255,255,255,.05);
      color:var(--text); font-family:inherit; font-size:13px; font-weight:700;
      cursor:pointer; text-decoration:none; display:flex; align-items:center; gap:6px;
      transition:background .2s,border-color .2s,transform .15s;
    }
    .hbtn:hover { background:rgba(6,182,212,.1); border-color:rgba(6,182,212,.4); transform:translateY(-1px); }
    .page { position:relative; z-index:1; max-width:560px; margin:0 auto; padding:40px 20px 80px; }
    .page-hero { text-align:center; margin-bottom:28px; animation:fadeUp .4s ease both; }
    .page-hero h1 { font-family:'Syne',sans-serif; font-size:1.8rem; font-weight:900; margin-bottom:8px; }
    .page-hero p { font-size:14px; color:var(--muted); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    .quiz-list { display:flex; flex-direction:column; gap:10px; }
    .quiz-item {
      display:flex; align-items:center; gap:14px;
      padding:16px 18px; border-radius:14px;
      background:var(--card); border:1px solid var(--card-border);
      cursor:pointer; text-decoration:none; color:var(--text);
      backdrop-filter:blur(10px);
      transition:background .2s,border-color .2s,transform .15s;
      animation:fadeUp .4s ease both;
      position:relative; overflow:hidden;
    }
    .quiz-item::before {
      content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      opacity:0; transition:opacity .2s;
    }
    .quiz-item:hover { background:rgba(6,182,212,.07); border-color:rgba(6,182,212,.3); transform:translateX(4px); }
    .quiz-item:hover::before { opacity:1; }
    .quiz-num {
      font-family:'Syne',sans-serif; font-size:.75rem; font-weight:900;
      color:var(--muted); min-width:28px; text-align:right;
    }
    .quiz-item-icon { font-size:1.4rem; flex-shrink:0; }
    .quiz-item-info { flex:1; min-width:0; }
    .quiz-item-name { font-family:'Syne',sans-serif; font-size:.95rem; font-weight:700; }
    .quiz-item-desc { font-size:12px; color:var(--muted); margin-top:2px; }
    .quiz-arrow { color:var(--muted); font-size:13px; transition:transform .15s,color .15s; }
    .quiz-item:hover .quiz-arrow { transform:translateX(3px); color:var(--accent); }

    @media(max-width:500px) {
      body { overflow-x:hidden; }
      header { padding:10px 14px; }
      .page { padding:20px 12px 60px; max-width:100vw; }
      .quiz-item { padding:12px 14px; }
    }
    @font-face {
      font-family:'Mochiy Pop One';
      src:url('MochiyPopOne-Regular.woff2') format('woff2');
      font-display:swap;
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <header>
    <span class="logo-text" id="homeLogo">AnimeHub</span>
    <a class="hbtn" href="animequiz.html"><i class="fa-solid fa-arrow-left"></i> Quiz</a>
  </header>

  <div class="page">
    <div class="page-hero">
      <h1>🥵 Challenge</h1>
      <p>Tape la bonne réponse sans indices — pour les vrais</p>
    </div>
    <div class="quiz-list" id="quizList"></div>
  </div>

  <script>
    const canvas=document.getElementById('stars'),ctx=canvas.getContext('2d');
    let w,h,pts;
    function resize(){w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight;}
    function init(){pts=Array.from({length:55},()=>({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.2+.3,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3}));}
    function draw(){
      ctx.clearRect(0,0,w,h);
      for(const p of pts){p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>w)p.dx*=-1;if(p.y<0||p.y>h)p.dy*=-1;}
      for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const a=pts[i],b=pts[j],d=Math.hypot(a.x-b.x,a.y-b.y);if(d<115){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(34,211,238,${(1-d/115)*.22})`;ctx.lineWidth=.6;ctx.stroke();}}
      for(const p of pts){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(200,240,255,.75)';ctx.fill();}
      requestAnimationFrame(draw);
    }
    resize();init();draw();
    window.addEventListener('resize',()=>{resize();init();});
    document.getElementById('homeLogo').addEventListener('click',()=>location.href='index.html');

    const quizzes = [
      { id:'personnages', icon:'🎭', name:'Personnages principaux', desc:'Trouve l\'anime à partir du personnage principal — 30 personnages' },
    ];

    const list = document.getElementById('quizList');
    quizzes.forEach((q, i) => {
      const el = document.createElement('a');
      el.className = 'quiz-item';
      el.href = `challenge-play.html?quiz=${q.id}`;
      el.style.animationDelay = `${i * 0.06}s`;
      el.innerHTML = `
        <span class="quiz-num">${String(i+1).padStart(2,'0')}</span>
        <span class="quiz-item-icon">${q.icon}</span>
        <div class="quiz-item-info">
          <div class="quiz-item-name">${q.name}</div>
          <div class="quiz-item-desc">${q.desc}</div>
        </div>
        <span class="quiz-arrow">→</span>`;
      list.appendChild(el);
    });
  </script>
</body>
</html>
