<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AnimeList – AnimeHub</title>
  <link rel="icon" type="image/png" href="icon_animehub.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon_animehub.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap');

    :root {
      --bg: #0b1220;
      --bg2: #061226;
      --card: #0d1628;
      --card-hover: #111e35;
      --muted: #7e8fa8;
      --accent: #06b6d4;
      --accent2: #3b82f6;
      --glass: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.07);
      --text: #e6eef6;
      --radius: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', ui-sans-serif, system-ui;
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      opacity: 1;
      transition: opacity 0.5s ease;
    }
    body.fonts-not-loaded { opacity: 0; }

    /* ── PAGE LOADER ── */
    .loader-overlay {
      position: fixed; inset: 0;
      background: linear-gradient(180deg, rgba(11,18,32,0.98) 0%, rgba(6,18,38,0.98) 100%);
      display: flex; align-items: center; justify-content: center;
      z-index: 2000;
      transition: opacity 0.4s ease;
    }
    .loader-overlay.hidden { opacity: 0; pointer-events: none; }
    .loader-card {
      background: rgba(13,22,40,0.9);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 32px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      width: min(380px, 80vw);
    }
    .loader-spinner {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: var(--accent);
      animation: spin 0.85s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { color: var(--muted); font-size: 14px; line-height: 1.5; }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(180deg, rgba(11,18,32,0.96) 0%, rgba(6,18,38,0.96) 100%);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid transparent;
      padding: 16px 32px;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    header.sticky {
      border-color: var(--border);
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    .logo-container { cursor: pointer; display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
    .logo {
      font-family: 'Mochiy Pop One', 'Syne', sans-serif;
      font-size: 2rem;
      background: linear-gradient(90deg, #fff59d, #ffeb3b, #ff9800, #ff5722);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-sub { font-size: 0.72rem; color: #94a3b8; letter-spacing: 0.3px; }

    .controls {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex: 1;
    }
    .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 280px; }
    .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: 0.5; pointer-events: none; }
    input.search {
      width: 100%;
      padding: 9px 12px 9px 34px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--glass);
      color: var(--text);
      font-family: inherit; font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input.search::placeholder { color: var(--muted); }
    input.search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(6,182,212,0.15); outline: none; }

    select.select, select.select-sm {
      padding: 9px 10px;
      border-radius: 10px;
      background: var(--glass);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit; font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    select.select:hover, select.select-sm:hover { border-color: rgba(6,182,212,0.4); }
    select option { background: #0d1628; color: var(--text); }

    /* Vue toggle */
    .view-toggle {
      display: flex; gap: 4px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
    }
    .view-btn {
      background: transparent; border: none;
      color: var(--muted); cursor: pointer;
      padding: 5px 9px; border-radius: 7px;
      font-size: 14px;
      transition: background 0.2s, color 0.2s;
    }
    .view-btn.active { background: rgba(6,182,212,0.2); color: var(--accent); }

    /* Auth */
    .hbtn {
      padding: 7px 12px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.05);
      color: #e6eef6; font-family: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer; text-decoration: none;
      display: flex; align-items: center; gap: 6px;
      transition: background .2s, border-color .2s, transform .15s;
    }
    .hbtn:hover { background: rgba(6,182,212,0.1); border-color: rgba(6,182,212,0.4); transform: translateY(-1px); }

    #authContainer {
      display: flex; gap: 8px; align-items: center;
      margin-left: auto;
    }
    .notif-container {
      position: relative; padding: 8px; border-radius: 10px; cursor: pointer;
      color: var(--muted); transition: background 0.2s, color 0.2s;
    }
    .notif-container:hover { background: var(--glass); color: var(--text); }
    .notif-badge {
      position: absolute; top: -2px; right: -4px;
      min-width: 16px; height: 16px; padding: 0 4px;
      display: none; align-items: center; justify-content: center;
      background: #ef4444; color: white;
      font-size: 10px; font-weight: 800;
      border-radius: 999px; border: 2px solid var(--bg);
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
      z-index: 200;
    }
    .notif-badge.show { display: flex; animation: pop 0.25s ease; }
    @keyframes pop { 0%{transform:scale(0)} 80%{transform:scale(1.2)} 100%{transform:scale(1)} }

    .notif-dropdown {
      position: absolute; top: calc(100% + 10px); right: 0;
      width: min(360px, calc(100vw - 24px));
      max-height: min(70vh, 500px); overflow: hidden;
      background: #0f172a;
      border-radius: 14px; border: 1px solid var(--border);
      box-shadow: 0 15px 40px rgba(0,0,0,0.6);
      z-index: 1300;
    }
    .notif-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-bottom: 1px solid var(--border);
    }
    .notif-title { font-size: 14px; font-weight: 700; }
    .notif-actions { display: flex; gap: 8px; }
    .notif-action-btn {
      border: 1px solid rgba(255,255,255,0.12); background: var(--glass);
      color: var(--text); border-radius: 8px; padding: 4px 8px;
      font-size: 12px; cursor: pointer; font-family: inherit;
    }
    .notif-action-btn:hover { background: rgba(255,255,255,0.1); }
    #notifList { list-style: none; max-height: calc(70vh - 60px); overflow-y: auto; }
    #notifList li {
      padding: 12px 14px; font-size: 13px;
      border-bottom: 1px solid var(--border);
      line-height: 1.4; cursor: pointer;
      transition: background 0.15s;
    }
    #notifList li:hover { background: rgba(255,255,255,0.04); }
    #notifList li.unread { background: rgba(6,182,212,0.07); border-left: 3px solid var(--accent); }
    #notifList li:last-child { border-bottom: none; }
    #notifEmpty { padding: 20px; color: var(--muted); text-align: center; font-size: 13px; }

    @media (max-width: 768px) {
      .notif-dropdown {
        position: fixed !important;
        top: unset !important;
        bottom: 0 !important;
        left: 0 !important; right: 0 !important;
        width: 100vw !important; height: 50vh; max-height: 50vh;
        border-radius: 18px 18px 0 0;
        animation: slideUp 0.25s ease;
      }
      #notifList { max-height: calc(50vh - 56px); }
    }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

    #userBox {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.08);
      padding: 6px 14px; border-radius: 999px;
      color: white; font-weight: 700; font-size: 14px;
      text-decoration: none; cursor: pointer;
      transition: background 0.2s;
    }
    #userBox:hover { background: rgba(255,255,255,0.14); }

    /* ── CONTAINER ── */
    .container { max-width: 1140px; margin: 0 auto; padding: 24px 20px 48px; }

    /* ── RESULT BAR ── */
    .result-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
    }
    .result-count {
      font-size: 13px; color: var(--muted);
    }
    .result-count strong { color: var(--accent); font-weight: 700; }

    /* ── SKELETON ── */
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .skeleton-card {
      border-radius: var(--radius); overflow: hidden;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
    }
    .skeleton-img {
      width: 100%; aspect-ratio: 2/3;
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.6s ease infinite;
    }
    .skeleton-body { padding: 14px; display: flex; flex-direction: column; gap: 8px; }
    .skeleton-line {
      height: 10px; border-radius: 6px;
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.6s ease infinite;
    }
    .skeleton-line.short { width: 55%; }
    .skeleton-line.xshort { width: 35%; }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── GRID VIEW ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    /* ── LIST VIEW ── */
    #grid.list-view {
      grid-template-columns: 1fr;
      gap: 10px;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease, background 0.22s ease;
      animation: cardIn 0.4s ease both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card:hover {
      transform: translateY(-5px);
      background: var(--card-hover);
      border-color: rgba(6,182,212,0.35);
      box-shadow: 0 16px 40px rgba(6,182,212,0.12), 0 4px 12px rgba(0,0,0,0.4);
    }

    /* Grid card */
    .card-poster {
      width: 100%; aspect-ratio: 2/3;
      object-fit: cover; display: block;
      background: #0a1020;
      transition: filter 0.22s ease;
    }
    .card:hover .card-poster { filter: brightness(1.08); }

    .card-body { padding: 12px; }
    .card-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .card-genres { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%; }
    .card-rating {
      font-size: 12px; font-weight: 700;
      background: rgba(0,0,0,0.4);
      padding: 2px 7px; border-radius: 8px;
      color: #fbbf24;
      display: flex; align-items: center; gap: 3px;
      flex-shrink: 0;
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 700;
      line-height: 1.3; margin-bottom: 8px;
      transition: color 0.2s;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card:hover .card-title { color: var(--accent); }

    /* Progress bar de visionnage */
    .progress-wrap { margin-bottom: 10px; }
    .progress-bar-bg {
      height: 3px; border-radius: 3px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.5s ease;
    }
    .progress-label {
      font-size: 10px; color: var(--muted);
      margin-top: 3px; display: flex; justify-content: space-between;
    }
    .status-badge {
      display: inline-block;
      font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 6px;
      margin-bottom: 8px;
    }
    .status-badge.completed { background: rgba(34,197,94,0.15); color: #4ade80; }
    .status-badge.watching  { background: rgba(6,182,212,0.15);  color: var(--accent); }
    .status-badge.planned   { background: rgba(148,163,184,0.12); color: #94a3b8; }

    .card-actions { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
    .card-year { font-size: 12px; color: var(--muted); }

    .btn {
      background: linear-gradient(135deg, var(--accent), #0ea5e9);
      color: #052226; padding: 7px 13px;
      border-radius: 9px; border: none; cursor: pointer;
      font-family: inherit; font-weight: 700; font-size: 12px;
      box-shadow: 0 3px 10px rgba(6,182,212,0.3);
      transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(6,182,212,0.45); filter: brightness(1.05); }
    .btn:active { transform: translateY(0); }

    .fav-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--accent); padding: 6px 9px;
      border-radius: 8px; cursor: pointer;
      font-size: 15px; line-height: 1;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }
    .fav-btn:hover { background: rgba(6,182,212,0.1); border-color: var(--accent); transform: scale(1.15); }

    /* Badge trending */
    .badge-trending {
      position: absolute; top: 9px; left: 9px;
      background: linear-gradient(135deg, #ff4500, #ff6b35);
      color: white; font-size: 10px; font-weight: 800;
      padding: 3px 7px; border-radius: 7px;
      pointer-events: none; z-index: 10;
      box-shadow: 0 2px 8px rgba(255,69,0,0.4);
    }

    /* ── LIST VIEW CARD OVERRIDE ── */
    #grid.list-view .card {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 0;
      border-radius: 14px;
    }
    #grid.list-view .card-poster {
      width: 80px; height: 110px;
      aspect-ratio: unset; object-fit: cover;
      border-radius: 14px 0 0 14px;
    }
    #grid.list-view .card-body {
      display: flex; flex-direction: column; justify-content: space-between;
      padding: 12px 14px;
    }
    #grid.list-view .card-title {
      font-size: 15px; -webkit-line-clamp: 1;
    }
    #grid.list-view .badge-trending {
      top: 8px; left: 88px;
    }
    #grid.list-view .progress-wrap { margin-bottom: 6px; }

    /* ── EMPTY ── */
    #empty {
      display: none; text-align: center;
      padding: 60px 20px; color: var(--muted);
    }
    #empty .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.4; }
    #empty p { font-size: 15px; }

    /* ── BACK TO TOP ── */
    #backToTop {
      position: fixed; bottom: 22px; right: 22px;
      padding: 10px 14px; font-size: 14px; font-weight: 700;
      border-radius: 10px; background: var(--accent);
      color: #052226; border: none; cursor: pointer;
      box-shadow: 0 6px 20px rgba(6,182,212,0.4);
      font-family: inherit;
      transition: opacity 0.2s, transform 0.2s;
      opacity: 0; transform: translateY(10px); pointer-events: none;
    }
    #backToTop.show { opacity: 1; transform: translateY(0); pointer-events: all; }

    footer { text-align: center; color: var(--muted); padding: 8px 0 0; font-size: 13px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 720px) {
      header { padding: 12px 16px; }
      .controls { width: 100%; }
      .search-wrap { max-width: 100%; }
      #authContainer { margin-left: 0; width: 100%; justify-content: flex-end; }
    }

    @font-face {
      font-family: 'Mochiy Pop One';
      src: url('MochiyPopOne-Regular.woff2') format('woff2');
      font-display: swap;
    }

    .btn:focus-visible, .fav-btn:focus-visible, #backToTop:focus-visible {
      outline: 2px solid rgba(6,182,212,0.8); outline-offset: 2px;
    }
  </style>
</head>
<body class="fonts-not-loaded">

  <!-- PAGE LOADER -->
  <div class="loader-overlay" id="pageLoader" aria-live="polite" aria-busy="true">
    <div class="loader-card">
      <div class="loader-spinner" aria-hidden="true"></div>
      <p class="loader-text" id="loadingMessage">Chargement...</p>
    </div>
  </div>

  <!-- HEADER -->
  <header id="mainHeader">
    <div class="logo-container" id="homeLogo">
      <h1 class="logo">AnimeHub</h1>
      <p class="logo-sub">Ton univers anime à portée de clic</p>
    </div>

    <div class="controls">
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden>
          <circle cx="11" cy="11" r="6" stroke="#9ca3af" stroke-width="2"/>
          <path d="M21 21l-4.35-4.35" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input id="search" class="search" placeholder="Rechercher un anime…" autocomplete="off"/>
      </div>
      <select id="genre" class="select"></select>
      <select id="sort" class="select-sm">
        <option value="top">⭐ Top rating</option>
        <option value="new">🆕 Plus récents</option>
        <option value="az">A → Z</option>
        <option value="za">Z → A</option>
        <option value="popular">🔥 Popularité</option>
      </select>
      <select id="statusFilter" class="select-sm">
        <option value="all">Tous statuts</option>
        <option value="completed">✅ Déjà vu</option>
        <option value="watching">▶️ En cours</option>
        <option value="planned">🕒 À voir</option>
      </select>
      <select id="favFilter" class="select-sm">
        <option value="all">Tous</option>
        <option value="fav">★ Favoris</option>
      </select>

      <!-- Toggle vue grille / liste -->
      <div class="view-toggle">
        <button class="view-btn active" id="btnGrid" title="Vue grille">
          <i class="fa-solid fa-grip"></i>
        </button>
        <button class="view-btn" id="btnList" title="Vue liste">
          <i class="fa-solid fa-list"></i>
        </button>
      </div>
    </div>

    <div id="authContainer">
      <div class="notif-container" id="notifBtn">
        <i class="fa-solid fa-bell"></i>
        <span class="notif-badge" id="notifBadge">0</span>
        <div class="notif-dropdown" id="notifDropdown" style="display:none;">
          <div class="notif-header">
            <p class="notif-title">Notifications</p>
            <div class="notif-actions">
              <button class="notif-action-btn" id="notifMarkAllBtn" type="button">Tout lire</button>
              <button class="notif-action-btn" id="notifCloseBtn" type="button">Fermer</button>
            </div>
          </div>
          <ul id="notifList"></ul>
          <div id="notifEmpty" style="display:none;">Aucune notification pour le moment.</div>
        </div>
      </div>
      <a href="stats.html" class="hbtn" style="font-size:12px;padding:6px 10px;"><i class="fa-solid fa-chart-bar"></i> Stats</a>
      <a href="profile.html" id="userBox">
        <i class="fa-solid fa-user" style="font-size:12px;opacity:0.7;"></i>
        <span id="username"></span>
      </a>
    </div>
  </header>

  <div class="container">
    <!-- BARRE RÉSULTATS -->
    <div class="result-bar">
      <p class="result-count" id="resultCount"></p>
    </div>

    <!-- SKELETON (visible pendant le chargement) -->
    <div class="skeleton-grid" id="skeletonGrid">
      <!-- généré en JS -->
    </div>

    <!-- GRILLE PRINCIPALE -->
    <main>
      <div id="grid" style="display:none;"></div>
      <div id="empty">
        <div class="empty-icon">🔍</div>
        <p>Aucun résultat pour cette recherche…</p>
      </div>
    </main>

    <footer>Il manque ton anime ? N'hésite pas à demander pour que je le rajoute.</footer>
  </div>

  <div id="modalRoot" style="display:none;"></div>
  <button id="backToTop" aria-label="Retour en haut">↑ Top</button>

  <!-- ══════════════════════════════════════
       SCRIPTS
  ══════════════════════════════════════ -->
  <script>
    let ANIMES = [];
    let filteredList = [];
    let currentIndex = 0;
    const ITEMS_PER_LOAD = 12;
    let currentView = 'grid'; // 'grid' | 'list'

    const genreEl       = document.getElementById('genre');
    const sortEl        = document.getElementById('sort');
    const favFilterEl   = document.getElementById('favFilter');
    const statusFilterEl= document.getElementById('statusFilter');
    const gridEl        = document.getElementById('grid');
    const searchInput   = document.getElementById('search');
    const emptyEl       = document.getElementById('empty');
    const resultCount   = document.getElementById('resultCount');
    const skeletonGrid  = document.getElementById('skeletonGrid');

    const urlParams     = new URLSearchParams(window.location.search);
    let genreFromUrl    = urlParams.get('genre');
    const favFromUrl    = urlParams.get('fav');

    // ── Loading messages ──
    const loadingMessages = [
      "⏳ Kira observe… chargement des animes en cours",
      "📓 Le Death Note s'ouvre… préparation de l'univers",
      "👁️ Ryuk rigole pendant que les animes arrivent",
      "🧱 Les murs tremblent… les animes arrivent",
      "⚔️ Le Bataillon d'Exploration prépare la page",
      "🟠 Chargement en cours… le ki monte",
      "🌌 Voyage vers Namek… encore un instant",
      "🐉 Shenron est invoqué… préparation des animes",
      "🕯️ Echidna observe… patience",
    ];
    const randomMsg = loadingMessages[Math.floor(Math.random() * loadingMessages.length)];
    document.getElementById('loadingMessage').textContent = randomMsg;

    // ── Skeleton ──
    function buildSkeleton(count = 12) {
      skeletonGrid.innerHTML = '';
      for (let i = 0; i < count; i++) {
        skeletonGrid.innerHTML += `
          <div class="skeleton-card">
            <div class="skeleton-img"></div>
            <div class="skeleton-body">
              <div class="skeleton-line xshort"></div>
              <div class="skeleton-line"></div>
              <div class="skeleton-line short"></div>
            </div>
          </div>`;
      }
    }
    buildSkeleton();

    // ── Vue toggle ──
    document.getElementById('btnGrid').addEventListener('click', () => setView('grid'));
    document.getElementById('btnList').addEventListener('click', () => setView('list'));

    function setView(v) {
      currentView = v;
      gridEl.classList.toggle('list-view', v === 'list');
      document.getElementById('btnGrid').classList.toggle('active', v === 'grid');
      document.getElementById('btnList').classList.toggle('active', v === 'list');
    }

    // ── Genres ──
    function refreshGenres() {
      const genres = new Set(['Tout']);
      ANIMES.forEach(a => (a.genre || []).forEach(g => genres.add(g)));
      genreEl.innerHTML = '';
      genres.forEach(g => {
        const o = document.createElement('option');
        o.textContent = o.value = g;
        genreEl.appendChild(o);
      });
      if (genreFromUrl) {
        const exists = [...genreEl.options].some(opt => opt.value === genreFromUrl);
        if (exists) genreEl.value = genreFromUrl;
      }
    }

    // ── Status label ──
    function statusBadgeHTML(status) {
      if (!status) return '';
      const map = {
        completed: ['✅ Déjà vu',  'completed'],
        watching:  ['▶️ En cours', 'watching'],
        planned:   ['🕒 À voir',   'planned'],
      };
      const [label, cls] = map[status] || ['', ''];
      return label ? `<span class="status-badge ${cls}">${label}</span>` : '';
    }

    // ── Progress bar ──
    function progressHTML(status) {
      if (!status) return '';
      const pct = status === 'completed' ? 100 : status === 'watching' ? 50 : 8;
      const label = status === 'completed' ? 'Terminé' : status === 'watching' ? 'En cours' : 'Pas commencé';
      return `
        <div class="progress-wrap">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width:${pct}%"></div>
          </div>
          <div class="progress-label"><span>${label}</span><span>${pct}%</span></div>
        </div>`;
    }

    // ── Render batch ──
    function renderNextBatch() {
      if (currentIndex >= filteredList.length) return;
      const batch = filteredList.slice(currentIndex, currentIndex + ITEMS_PER_LOAD);

      batch.forEach((a, i) => {
        const poster = a.img || 'icon_animehub.png';
        const ratingStr = Number.isFinite(a.rating) ? a.rating.toFixed(1) : '—';
        const delay = (i * 55);

        const card = document.createElement('div');
        card.className = 'card';
        card.style.animationDelay = `${delay}ms`;

        card.innerHTML = `
          ${a.likes >= 3 ? '<span class="badge-trending">🔥 Tendance</span>' : ''}
          <img class="card-poster ${a.img ? '' : 'fallback-img'}" src="${poster}" alt="${a.title || 'Anime'}" loading="lazy">
          <div class="card-body">
            <div class="card-meta">
              <span class="card-genres">${(a.genre || []).join(' · ')}</span>
              <span class="card-rating">⭐ ${ratingStr}</span>
            </div>
            ${statusBadgeHTML(a.status)}
            <div class="card-title">${a.title}</div>
            ${progressHTML(a.status)}
            <div class="card-actions">
              <span class="card-year">${a.year ?? '—'}</span>
              <div style="display:flex;gap:6px;">
                <button class="fav-btn" data-id="${a.id}" aria-label="Favori">${a.fav ? '★' : '☆'}</button>
                <button class="btn" onclick="openAnime(${a.id})">Voir</button>
              </div>
            </div>
          </div>`;

        gridEl.appendChild(card);
      });

      currentIndex += ITEMS_PER_LOAD;
    }

    function openAnime(id) {
      window.location.href = `anime.html?id=${id}`;
    }

    // ── Apply filters ──
    function applyFilters() {
      const q = searchInput.value.toLowerCase().trim();
      const g = genreEl.value;
      const s = sortEl.value;
      const f = favFilterEl.value;

      filteredList = ANIMES.filter(a => (a.title || '').toLowerCase().includes(q));

      if (g !== 'Tout') filteredList = filteredList.filter(a => (a.genre || []).includes(g));
      if (genreFromUrl)  filteredList = filteredList.filter(a => (a.genre || []).includes(genreFromUrl));
      if (f === 'fav')   filteredList = filteredList.filter(a => a.fav);
      if (favFromUrl === '1') favFilterEl.value = 'fav';
      if (statusFilterEl.value !== 'all') filteredList = filteredList.filter(a => a.status === statusFilterEl.value);

      if (s === 'top')     filteredList.sort((a,b) => (Number.isFinite(b.rating)?b.rating:-1) - (Number.isFinite(a.rating)?a.rating:-1));
      if (s === 'new')     filteredList.sort((a,b) => (b.year||0)-(a.year||0));
      if (s === 'az')      filteredList.sort((a,b) => a.title.localeCompare(b.title));
      if (s === 'za')      filteredList.sort((a,b) => b.title.localeCompare(a.title));
      if (s === 'popular') filteredList.sort((a,b) => (b.likes||0)-(a.likes||0));

      currentIndex = 0;
      gridEl.innerHTML = '';
      emptyEl.style.display = 'none';

      if (!filteredList.length) {
        emptyEl.style.display = 'block';
        resultCount.innerHTML = '<strong>0</strong> résultat';
      } else {
        resultCount.innerHTML = `<strong>${filteredList.length}</strong> anime${filteredList.length > 1 ? 's' : ''}`;
        renderNextBatch();
      }
    }

    // Debounce recherche
    let searchTimer;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(applyFilters, 180);
    });

    genreEl.addEventListener('change', () => {
      genreFromUrl = genreEl.value === 'Tout' ? null : genreEl.value;
      applyFilters();
    });
    sortEl.addEventListener('change', applyFilters);
    favFilterEl.addEventListener('change', applyFilters);
    statusFilterEl.addEventListener('change', applyFilters);

    // ── Scroll ──
    const backToTop = document.getElementById('backToTop');
    backToTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    window.addEventListener('scroll', () => {
      backToTop.classList.toggle('show', window.scrollY > 300);
      document.getElementById('mainHeader').classList.toggle('sticky', window.scrollY > 20);
      if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) renderNextBatch();
    });

    document.getElementById('homeLogo').addEventListener('click', () => location.href = 'index.html');
    document.fonts.ready.then(() => document.body.classList.remove('fonts-not-loaded'));

    window.AnimeHub = { ANIMES, applyFilters };
  </script>

  <!-- ── FIREBASE ── -->
  <script type="module">
    import { initializeApp }    from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
    import {
      getFirestore, doc, getDoc, setDoc, updateDoc,
      arrayUnion, arrayRemove, increment,
      collection, getDocs, query, where, orderBy,
      addDoc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCaJZi1Bn1vbeKOC5cM3Gi6nOFyWaH4NK4",
      authDomain: "animehub-7.firebaseapp.com",
      projectId: "animehub-7",
      storageBucket: "animehub-7.firebasestorage.app",
      messagingSenderId: "159114039206",
      appId: "1:159114039206:web:0461d676e7ffff25c4c967",
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const pageLoader     = document.getElementById('pageLoader');
    const userBox        = document.getElementById('userBox');
    const usernameEl     = document.getElementById('username');
    const notifBtn       = document.getElementById('notifBtn');
    const notifBadge     = document.getElementById('notifBadge');
    const notifDropdown  = document.getElementById('notifDropdown');
    const notifList      = document.getElementById('notifList');
    const notifEmpty     = document.getElementById('notifEmpty');
    const notifMarkAllBtn= document.getElementById('notifMarkAllBtn');
    const notifCloseBtn  = document.getElementById('notifCloseBtn');
    const gridEl         = document.getElementById('grid');
    const skeletonGrid   = document.getElementById('skeletonGrid');
    let notifItems = [];

    // ── Notifications ──
    // Sur mobile : déplacer la dropdown dans <body> pour que position:fixed fonctionne
    if (window.innerWidth <= 768) {
      document.body.appendChild(notifDropdown);
    }
    window.addEventListener('resize', () => {
      if (window.innerWidth <= 768 && notifDropdown.parentElement !== document.body) {
        document.body.appendChild(notifDropdown);
      } else if (window.innerWidth > 768 && notifDropdown.parentElement === document.body) {
        notifBtn.appendChild(notifDropdown);
      }
    });

    function setDropdown(open) { notifDropdown.style.display = open ? 'block' : 'none'; }
    notifBtn.addEventListener('click', e => { e.stopPropagation(); setDropdown(notifDropdown.style.display === 'none'); });
    notifDropdown.addEventListener('click', e => e.stopPropagation());
    notifCloseBtn.addEventListener('click', () => setDropdown(false));
    document.addEventListener('click', e => { if (!notifBtn.contains(e.target) && !notifDropdown.contains(e.target)) setDropdown(false); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') setDropdown(false); });

    notifMarkAllBtn.addEventListener('click', async e => {
      e.stopPropagation();
      const unread = notifItems.filter(n => !n.read);
      if (!unread.length) return;
      await Promise.all(unread.map(n => updateDoc(doc(db, 'notifications', n.id), { read: true })));
      notifItems = notifItems.map(n => ({ ...n, read: true }));
      renderNotifications();
    });

    async function loadNotifications(uid) {
      const q = query(collection(db, 'notifications'), where('userId', '==', uid), orderBy('createdAt', 'desc'));
      const snap = await getDocs(q);
      notifItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderNotifications();
    }

    function renderNotifications() {
      notifList.innerHTML = '';
      let unread = 0;
      notifEmpty.style.display = notifItems.length ? 'none' : 'block';
      notifItems.forEach(n => {
        const li = document.createElement('li');
        li.className = n.read ? '' : 'unread';
        li.innerHTML = `<strong>${n.title}</strong><br><span style="font-size:.85em;opacity:.75;">${n.message||''}</span>`;
        if (!n.read) unread++;
        li.addEventListener('click', async e => {
          e.stopPropagation();
          if (n.read) return;
          await updateDoc(doc(db, 'notifications', n.id), { read: true });
          n.read = true; li.classList.remove('unread'); renderNotifications();
        });
        notifList.appendChild(li);
      });
      notifBadge.textContent = unread;
      notifBadge.classList.toggle('show', unread > 0);
    }

    // ── Auth ──
    onAuthStateChanged(auth, async user => {
      if (!user) {
        userBox.style.display = 'none';
        skeletonGrid.style.display = 'none';
        pageLoader.style.display = 'none';
        return;
      }

      userBox.style.display = 'flex';

      try {
        const userRef  = doc(db, 'users', user.uid);
        const userSnap = await getDoc(userRef);
        if (userSnap.exists()) {
          usernameEl.textContent = userSnap.data().username || user.email.split('@')[0];
        } else {
          const userData = { username: user.email.split('@')[0], email: user.email, favorites: [], ratings: {} };
          await setDoc(userRef, userData);
          usernameEl.textContent = userData.username;
        }
      } catch(e) {
        usernameEl.textContent = user.email.split('@')[0];
      }

      await loadAnimes();
      await loadFavorites();
      await loadStatuses();
      await loadNotifications(user.uid);
      applyFilters();
    });

    // ── Load animes ──
    async function loadAnimes() {
      const snap = await getDocs(collection(db, 'animes'));
      const animes = snap.docs.map(d => {
        const data = d.data();
        const anilistScore = Number.isFinite(data.anilistScore) ? data.anilistScore / 10 : null;
        return {
          id: Number(d.id),
          title: data.title,
          genre: data.genre || [],
          img: data.img || 'icon_animehub.png',
          rating: Number.isFinite(data.avgRating) ? data.avgRating : anilistScore,
          likes: data.likes || 0,
          year: data.seasonYear || data.year || null,
          summary: data.summary || '',
          fav: false, status: null,
        };
      });

      ANIMES.splice(0, ANIMES.length, ...animes);
      window.AnimeHub = { ANIMES, applyFilters };
      refreshGenres();

      // Cacher skeleton, montrer grille
      skeletonGrid.style.display = 'none';
      gridEl.style.display = 'grid';

      pageLoader.classList.add('hidden');
      setTimeout(() => pageLoader.style.display = 'none', 400);
    }

    // ── Favorites ──
    async function loadFavorites() {
      const user = auth.currentUser;
      if (!user) return;
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (!snap.exists()) return;
      const favs = snap.data().favorites || [];
      ANIMES.forEach(a => { a.fav = favs.includes(a.id); });
    }

    async function loadStatuses() {
      const user = auth.currentUser;
      if (!user) return;
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (!snap.exists()) return;
      const statuses = snap.data().statuses || {};
      ANIMES.forEach(a => { a.status = statuses[a.id] || null; });
    }

    async function sendNotification(uid, title, message = '') {
      try {
        await addDoc(collection(db, 'notifications'), { userId: uid, title, message, read: false, createdAt: serverTimestamp() });
        await loadNotifications(uid);
      } catch(e) { console.error(e); }
    }

    async function toggleFavorite(animeId) {
      const user = auth.currentUser;
      if (!user) { alert('Connecte-toi pour ajouter un favori !'); return; }
      const anime = ANIMES.find(a => a.id === animeId);
      if (!anime) return;

      const userRef  = doc(db, 'users', user.uid);
      const animeRef = doc(db, 'animes', String(animeId));
      const wasFav   = anime.fav;
      anime.fav = !wasFav;

      try {
        const snap = await getDoc(animeRef);
        if (!snap.exists()) await setDoc(animeRef, { likes: 0 }, { merge: true });
        if (!wasFav) {
          await updateDoc(userRef, { favorites: arrayUnion(animeId) });
          await updateDoc(animeRef, { likes: increment(1) });
          await sendNotification(user.uid, `Tu as ajouté ${anime.title} à tes favoris !`);
        } else {
          await updateDoc(userRef, { favorites: arrayRemove(animeId) });
          await updateDoc(animeRef, { likes: increment(-1) });
        }
      } catch(e) { console.error(e); }

      const btn = gridEl.querySelector(`.fav-btn[data-id="${animeId}"]`);
      if (btn) btn.textContent = anime.fav ? '★' : '☆';
      applyFilters();
    }

    window.toggleFavorite = toggleFavorite;
    gridEl.addEventListener('click', e => {
      if (e.target.classList.contains('fav-btn')) {
        e.stopPropagation();
        toggleFavorite(Number(e.target.dataset.id));
      }
    });
  </script>
