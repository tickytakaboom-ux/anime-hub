<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AnimeHub – Profil</title>
  <link rel="icon" type="image/png" href="icon_animehub.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon_animehub.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap');

    :root {
      --bg: #0b1220;
      --bg2: #061226;
      --card: rgba(13,22,40,0.85);
      --card-border: rgba(255,255,255,0.07);
      --accent: #06b6d4;
      --accent2: #3b82f6;
      --muted: #7e8fa8;
      --text: #e6eef6;
      --success: #4ade80;
      --radius: 18px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', ui-sans-serif, system-ui;
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      opacity: 1; transition: opacity 0.5s ease;
    }
    body.fonts-not-loaded { opacity: 0; }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(180deg, rgba(11,18,32,0.96) 0%, rgba(6,18,38,0.96) 100%);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid transparent;
      padding: 14px 32px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    header.sticky { border-color: var(--card-border); box-shadow: 0 4px 24px rgba(0,0,0,0.5); }

    .logo-link {
      text-decoration: none; display: flex; align-items: center; gap: 8px;
    }
    .logo-text {
      font-family: 'Mochiy Pop One', 'Syne', sans-serif;
      font-size: 1.5rem;
      background: linear-gradient(90deg, #fff59d, #ffeb3b, #ff9800, #ff5722);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    .btn-sm {
      padding: 8px 16px; border-radius: 10px; border: none; cursor: pointer;
      font-family: inherit; font-weight: 700; font-size: 13px;
      transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #052226;
      box-shadow: 0 3px 12px rgba(6,182,212,0.3);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(6,182,212,0.45); filter: brightness(1.05); }
    .btn-ghost {
      background: transparent; border: 1px solid rgba(255,255,255,0.15);
      color: var(--text);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.07); transform: translateY(-1px); }
    .btn-danger {
      background: transparent; border: 1px solid rgba(248,113,113,0.3);
      color: #f87171;
    }
    .btn-danger:hover { background: rgba(248,113,113,0.1); transform: translateY(-1px); }

    /* ── LAYOUT ── */
    .page { max-width: 1160px; margin: 0 auto; padding: 28px 20px 60px; width: 100%; box-sizing: border-box; }

    .top-section {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .bottom-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .full-width { grid-column: 1 / -1; }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 24px;
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.35);
      animation: cardIn 0.5s ease both;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .card:hover { border-color: rgba(6,182,212,0.15); }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 700;
      margin-bottom: 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .card-title-icon { opacity: 0.6; font-size: 0.9rem; }

    /* ── SKELETON ── */
    .skeleton-box {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.6s ease infinite;
      border-radius: 10px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── PROFIL CARD ── */
    .profile-card { text-align: center; }

    /* Avatar picker */
    .avatar-wrap { position: relative; display: inline-block; margin-bottom: 16px; }
    .avatar {
      width: 96px; height: 96px; border-radius: 50%;
      font-size: 2.2rem; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto;
      border: 3px solid rgba(6,182,212,0.3);
      box-shadow: 0 0 0 6px rgba(6,182,212,0.08);
      cursor: pointer; position: relative;
      transition: border-color 0.2s, box-shadow 0.2s;
      user-select: none;
    }
    .avatar:hover { border-color: rgba(6,182,212,0.6); box-shadow: 0 0 0 6px rgba(6,182,212,0.15); }
    .avatar-edit-hint {
      position: absolute; bottom: 0; right: 0;
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent); color: #052226;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      border: 2px solid var(--bg);
    }

    /* Avatar picker dropdown */
    .avatar-picker {
      position: absolute; top: 108px; left: 50%; transform: translateX(-50%);
      background: #0f1a2e; border: 1px solid var(--card-border);
      border-radius: 14px; padding: 14px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.6);
      z-index: 200; width: 280px;
      display: none;
    }
    .avatar-picker.open { display: block; animation: cardIn 0.2s ease; }
    .picker-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .picker-emojis { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .picker-emoji {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--card-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; cursor: pointer;
      transition: background 0.15s, transform 0.15s;
    }
    .picker-emoji:hover { background: rgba(6,182,212,0.15); transform: scale(1.1); }
    .picker-emoji.selected { border-color: var(--accent); background: rgba(6,182,212,0.2); }
    .picker-colors { display: flex; gap: 6px; flex-wrap: wrap; }
    .picker-color {
      width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
    }
    .picker-color:hover { transform: scale(1.15); }
    .picker-color.selected { border-color: white; }

    /* Username + edit */
    .username-row {
      display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 4px;
    }
    .username-display {
      font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 900;
    }
    .edit-icon-btn {
      background: transparent; border: none; cursor: pointer;
      color: var(--muted); font-size: 13px; padding: 4px;
      border-radius: 6px; transition: color 0.2s, background 0.2s;
    }
    .edit-icon-btn:hover { color: var(--accent); background: rgba(6,182,212,0.1); }

    .username-edit-row {
      display: none; align-items: center; gap: 6px; justify-content: center; margin-bottom: 4px;
    }
    .username-edit-row.open { display: flex; }
    .username-input {
      padding: 7px 10px; border-radius: 9px;
      border: 1px solid rgba(6,182,212,0.4);
      background: rgba(255,255,255,0.06); color: var(--text);
      font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
      outline: none; width: 160px;
    }
    .username-input:focus { box-shadow: 0 0 0 3px rgba(6,182,212,0.15); }
    .save-username-btn {
      background: var(--accent); color: #052226;
      border: none; border-radius: 8px; padding: 7px 10px;
      cursor: pointer; font-size: 13px; font-weight: 700; font-family: inherit;
      transition: filter 0.15s;
    }
    .save-username-btn:hover { filter: brightness(1.1); }
    .cancel-username-btn {
      background: transparent; border: 1px solid var(--card-border);
      color: var(--muted); border-radius: 8px; padding: 7px 10px;
      cursor: pointer; font-size: 13px; font-family: inherit;
    }

    .profile-email { font-size: 13px; color: var(--muted); margin-bottom: 12px; }

    /* Bio */
    .bio-text { font-size: 13px; color: #c0c8d6; margin-bottom: 10px; min-height: 20px; }
    .bio-input {
      width: 100%; min-height: 60px; padding: 8px 10px;
      border-radius: 10px; border: 1px solid rgba(6,182,212,0.3);
      background: rgba(255,255,255,0.05); color: var(--text);
      font-family: inherit; font-size: 13px; resize: vertical; outline: none;
    }
    .bio-input:focus { box-shadow: 0 0 0 3px rgba(6,182,212,0.12); }
    .bio-actions { display: flex; gap: 6px; margin-top: 6px; }

    /* Share */
    .share-row {
      margin-top: 14px; padding-top: 14px;
      border-top: 1px solid var(--card-border);
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center;
    }
    .share-url {
      font-size: 11px; color: var(--muted);
      background: rgba(255,255,255,0.04); border: 1px solid var(--card-border);
      border-radius: 8px; padding: 6px 10px; flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-family: monospace;
    }
    .copy-btn {
      background: rgba(6,182,212,0.1); border: 1px solid rgba(6,182,212,0.25);
      color: var(--accent); border-radius: 8px; padding: 6px 10px;
      font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
      white-space: nowrap; transition: background 0.15s;
    }
    .copy-btn:hover { background: rgba(6,182,212,0.2); }
    .copy-btn.copied { color: var(--success); border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.1); }

    /* ── STATS ── */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .stat-box {
      background: rgba(255,255,255,0.04); border: 1px solid var(--card-border);
      border-radius: 12px; padding: 14px 10px; text-align: center;
      transition: background 0.2s, border-color 0.2s;
    }
    .stat-box:hover { background: rgba(6,182,212,0.08); border-color: rgba(6,182,212,0.25); }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 900; color: var(--accent); }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }

    /* ── LISTES ── */
    .list-controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .mini-select {
      background: rgba(255,255,255,0.06); border: 1px solid var(--card-border);
      color: var(--text); border-radius: 8px; padding: 6px 8px;
      font-size: 12px; font-family: inherit; cursor: pointer;
    }
    .rated-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; padding-right: 4px; }
    .rated-list::-webkit-scrollbar { width: 5px; }
    .rated-list::-webkit-scrollbar-thumb { background: rgba(6,182,212,0.4); border-radius: 3px; }

    .rated-item {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.04); border: 1px solid var(--card-border);
      border-radius: 11px; padding: 10px 12px;
      cursor: pointer; gap: 8px;
      animation: cardIn 0.35s ease both;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }
    .rated-item:hover { background: rgba(6,182,212,0.07); border-color: rgba(6,182,212,0.25); transform: translateX(3px); }
    .rated-title { font-size: 13px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rated-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .rated-score { font-weight: 800; color: var(--accent); min-width: 22px; text-align: center; font-size: 14px; }
    .rated-btn {
      font-size: 11px; padding: 4px 9px; border-radius: 7px;
      border: 1px solid var(--card-border); background: transparent;
      color: var(--text); cursor: pointer; font-family: inherit; font-weight: 700;
      transition: background 0.15s, color 0.15s;
    }
    .rated-btn:hover { background: var(--accent); color: #052226; border-color: transparent; }

    .empty-text { font-size: 13px; color: var(--muted); text-align: center; padding: 20px 0; }

    /* ── BADGES ── */
    .badges-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .badge {
      padding: 6px 12px; border-radius: 20px;
      background: linear-gradient(135deg, rgba(6,182,212,0.2), rgba(59,130,246,0.2));
      border: 1px solid rgba(6,182,212,0.25);
      font-size: 12px; font-weight: 700; color: var(--text);
      transition: transform 0.2s, background 0.2s;
      cursor: default;
    }
    .badge:hover { transform: translateY(-2px) scale(1.05); background: linear-gradient(135deg, rgba(6,182,212,0.35), rgba(59,130,246,0.35)); }

    /* Badge progress */
    .badge-progress-wrap { margin-top: 14px; }
    .badge-progress-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
    .badge-progress-bar-bg { height: 6px; border-radius: 6px; background: rgba(255,255,255,0.07); overflow: hidden; }
    .badge-progress-bar-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.8s ease; }

    /* ── RECO ── */
    .reco-modes { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .reco-mode-btn {
      padding: 7px 14px; border-radius: 10px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--card-border);
      color: var(--text); font-family: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }
    .reco-mode-btn:hover { background: rgba(255,255,255,0.09); transform: translateY(-1px); }
    .reco-mode-btn.active { background: rgba(6,182,212,0.15); border-color: var(--accent); color: var(--accent); box-shadow: 0 4px 14px rgba(6,182,212,0.2); }

    .reco-list { display: flex; flex-direction: column; gap: 8px; }
    .tag { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 6px; background: rgba(6,182,212,0.15); color: var(--accent); font-weight: 700; margin-left: 5px; }
    .reco-reasons { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .reco-reason { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: rgba(255,255,255,0.07); color: #94a3b8; }

    /* ── BACK TO TOP ── */
    #topBtn {
      position: fixed; bottom: 22px; right: 22px;
      padding: 10px 14px; font-size: 13px; font-weight: 700;
      border-radius: 10px; background: var(--accent); color: #052226;
      border: none; cursor: pointer; font-family: inherit;
      box-shadow: 0 6px 20px rgba(6,182,212,0.4);
      opacity: 0; transform: translateY(10px); pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    #topBtn.show { opacity: 1; transform: translateY(0); pointer-events: all; }

    :focus-visible { outline: 2px solid rgba(6,182,212,0.7); outline-offset: 2px; }

    @media (max-width: 900px) {
      .top-section { grid-template-columns: 1fr; }
      .bottom-section { grid-template-columns: 1fr; }
    }

    @media (max-width: 600px) {
      /* Header */
      header { padding: 10px 14px; flex-wrap: wrap; gap: 8px; }
      .header-actions { gap: 6px; }
      .btn-sm { padding: 6px 10px; font-size: 12px; }

      /* Page — forcer 100% de la largeur visible */
      .page { padding: 14px 10px 48px; max-width: 100vw; overflow-x: hidden; }
      .top-section, .bottom-section { gap: 12px; width: 100%; }

      /* Avatar */
      .avatar-wrap { flex-direction: column; align-items: center; text-align: center; }
      .avatar { width: 72px; height: 72px; font-size: 1.8rem; }
      .user-name { font-size: 1.2rem; text-align: center; }
      .user-meta { justify-content: center; flex-wrap: wrap; }

      /* Stats */
      .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stat-value { font-size: 1.1rem; }
      .stat-label { font-size: 10px; }

      /* Cards — pas de débordement */
      .card { padding: 14px 12px; min-width: 0; max-width: 100%; box-sizing: border-box; }
      .card-title { font-size: 0.82rem; }

      /* Picker avatar */
      #avatarPicker {
        position: fixed !important;
        top: unset !important;
        bottom: 0 !important;
        left: 0 !important;
        right: 0 !important;
        width: 100vw !important;
        transform: none !important;
        border-radius: 18px 18px 0 0;
        max-height: 70vh;
        overflow-y: auto;
        padding: 20px 16px 32px;
        z-index: 500;
      }
      .picker-emojis { display: flex; flex-wrap: wrap; gap: 8px; }
      .picker-emoji { width: 40px; height: 40px; font-size: 1.3rem; }

      /* Textes longs */
      .user-name, .rated-title, .reco-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }

      /* Listes */
      .rated-list { max-height: 200px; }
      .rated-item { font-size: 13px; }

      /* Bio */
      #bioInput { font-size: 13px; }

      /* Badge progress */
      .badge-progress-wrap { padding: 10px 12px; }

      /* Boutons inline */
      .btn-primary, .btn-ghost { padding: 8px 14px; font-size: 13px; }
    }

    /* Anti-débordement global sur mobile */
    @media (max-width: 600px) {
      body { overflow-x: hidden; }
      * { max-width: 100%; box-sizing: border-box; }
      img { max-width: 100%; height: auto; }
      .activity-item { padding: 8px 10px; gap: 8px; }
      .activity-title { font-size: 12px; }
      .activity-time { font-size: 10px; }
      .reco-list { gap: 6px; }
      .reco-item { padding: 8px 10px; }
      .reco-title { font-size: 12px; }
      .badge-progress-wrap { padding: 8px 10px; }
      .badge-name { font-size: 12px; }
    }

    /* ── ACTIVITÉ RÉCENTE ── */
    .activity-list { display:flex; flex-direction:column; gap:8px; }
    .activity-item {
      display:flex; align-items:center; gap:12px;
      padding:10px 12px; border-radius:12px;
      background:rgba(255,255,255,.04); border:1px solid var(--card-border);
      transition:background .15s, border-color .15s;
      text-decoration:none; color:var(--text); cursor:pointer;
    }
    .activity-item:hover { background:rgba(6,182,212,.07); border-color:rgba(6,182,212,.25); }
    .activity-poster {
      width:30px; height:42px; border-radius:5px;
      object-fit:cover; flex-shrink:0; background:#0a1020;
    }
    .activity-info { flex:1; min-width:0; }
    .activity-title { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .activity-sub { font-size:11px; color:var(--muted); margin-top:2px; }
    .activity-time { font-size:11px; color:var(--muted); flex-shrink:0; }
    .activity-icon { font-size:1.1rem; flex-shrink:0; width:24px; text-align:center; }

    @font-face {
      font-family: 'Mochiy Pop One';
      src: url('MochiyPopOne-Regular.woff2') format('woff2');
      font-display: swap;
    }
  </style>
</head>
<body class="fonts-not-loaded">

  <!-- HEADER -->
  <header id="mainHeader">
    <a class="logo-link" href="index.html">
      <span class="logo-text">AnimeHub</span>
    </a>
    <div class="header-actions">
      <button class="btn-sm btn-ghost" onclick="location.href='stats.html'"><i class="fa-solid fa-chart-bar" style="margin-right:5px;"></i>Stats</button>
      <button class="btn-sm btn-ghost" onclick="location.href='animelist.html'">
        <i class="fa-solid fa-list" style="margin-right:5px;"></i>AnimeList
      </button>
      <button class="btn-sm btn-danger" id="logoutBtn">
        <i class="fa-solid fa-right-from-bracket" style="margin-right:5px;"></i>Déconnexion
      </button>
    </div>
  </header>

  <div class="page">

    <!-- TOP SECTION -->
    <div class="top-section">

      <!-- PROFIL CARD -->
      <div class="card profile-card" style="animation-delay:0s;">
        <!-- Avatar -->
        <div class="avatar-wrap" id="avatarWrap">
          <div class="avatar" id="avatar" style="background: linear-gradient(135deg,#06b6d4,#3b82f6);">
            <span id="avatarContent">?</span>
          </div>
          <div class="avatar-edit-hint" title="Personnaliser">✏️</div>

          <!-- Picker -->
          <div class="avatar-picker" id="avatarPicker">
            <div class="picker-label">Emoji</div>
            <div class="picker-emojis" id="pickerEmojis"></div>
            <div class="picker-label">Couleur de fond</div>
            <div class="picker-colors" id="pickerColors"></div>
          </div>
        </div>

        <!-- Pseudo -->

  <script>
    /* ── AVATAR PICKER ── */
    const OWNER_UID    = 'FlDsDO7AsFM5WDC3xpUpXMaHnzv2';
    const OWNER_EMOJIS = ['🍰']; // emojis exclusifs créateur
    const EMOJIS       = ['😸','🦊','🐉','⚡','🌸','👾','🔥','🌙','⚔️','🎌','🌊','🦋','🎭','💀','🎯'];
    let   isOwner      = false; // mis à jour après auth
    const COLORS  = [
      ['#06b6d4','#3b82f6'], ['#f97316','#ef4444'], ['#8b5cf6','#ec4899'],
      ['#10b981','#06b6d4'], ['#fbbf24','#f97316'], ['#6366f1','#8b5cf6'],
      ['#e11d48','#f43f5e'], ['#0ea5e9','#22d3ee'],
    ];

    let pickerOpen = false;
    let selectedEmoji = null;
    let selectedColorIdx = 0;

    const avatarEl     = document.getElementById('avatar');
    const avatarContent= document.getElementById('avatarContent');
    const avatarWrap   = document.getElementById('avatarWrap');
    const avatarPicker = document.getElementById('avatarPicker');
    const pickerEmojis = document.getElementById('pickerEmojis');
    const pickerColors = document.getElementById('pickerColors');

    // Build emoji grid (appelé après auth pour connaître isOwner)
    function buildEmojiPicker() {
      pickerEmojis.innerHTML = '';
      const allEmojis = [...EMOJIS, ...OWNER_EMOJIS];
      allEmojis.forEach((em) => {
        const isExclusive = OWNER_EMOJIS.includes(em);
        const locked = isExclusive && !isOwner;

        const btn = document.createElement('div');
        btn.className = 'picker-emoji';
        btn.textContent = em;
        btn.title = locked ? '🔒 Emoji exclusif créateur' : em;

        if (locked) {
          btn.style.opacity = '0.25';
          btn.style.filter  = 'grayscale(1)';
          btn.style.cursor  = 'not-allowed';
          btn.style.position = 'relative';
        } else {
          btn.addEventListener('click', () => {
            selectedEmoji = em;
            avatarContent.textContent = em;
            document.querySelectorAll('.picker-emoji').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            window._saveAvatarPref();
          });
        }
        pickerEmojis.appendChild(btn);
      });
    }
    buildEmojiPicker(); // build initial (isOwner = false)

    // Sur mobile : déplacer le picker dans <body> pour que position:fixed fonctionne
    if (window.innerWidth <= 600) {
      document.body.appendChild(avatarPicker);
    }
    window.addEventListener('resize', () => {
      if (window.innerWidth <= 600 && avatarPicker.parentElement !== document.body) {
        document.body.appendChild(avatarPicker);
      } else if (window.innerWidth > 600 && avatarPicker.parentElement === document.body) {
        avatarWrap.appendChild(avatarPicker);
      }
    });

    // Build color grid
    COLORS.forEach((pair, i) => {
      const btn = document.createElement('div');
      btn.className = 'picker-color';
      btn.style.background = `linear-gradient(135deg,${pair[0]},${pair[1]})`;
      btn.addEventListener('click', () => {
        selectedColorIdx = i;
        avatarEl.style.background = `linear-gradient(135deg,${pair[0]},${pair[1]})`;
        document.querySelectorAll('.picker-color').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        window._saveAvatarPref();
      });
      pickerColors.appendChild(btn);
    });

    avatarWrap.addEventListener('click', e => {
      e.stopPropagation();
      pickerOpen = !pickerOpen;
      avatarPicker.classList.toggle('open', pickerOpen);
    });
    document.addEventListener('click', () => {
      pickerOpen = false; avatarPicker.classList.remove('open');
    });
    avatarPicker.addEventListener('click', e => e.stopPropagation());

    // saveAvatarPref est définie après l'auth Firebase (accès à userRef + setDoc)
    window._saveAvatarPref = function() {};  // stub remplacé après connexion
    function loadAvatarPref(savedAvatar, fallbackLetter) {
      if (savedAvatar) {
        selectedColorIdx = savedAvatar.colorIdx ?? 0;
        const pair = COLORS[selectedColorIdx];
        avatarEl.style.background = `linear-gradient(135deg,${pair[0]},${pair[1]})`;
        if (savedAvatar.emoji) {
          selectedEmoji = savedAvatar.emoji;
          avatarContent.textContent = savedAvatar.emoji;
          document.querySelectorAll('.picker-emoji').forEach(b => {
            b.classList.toggle('selected', b.textContent === savedAvatar.emoji);
          });
        } else {
          avatarContent.textContent = fallbackLetter;
        }
        document.querySelectorAll('.picker-color')[selectedColorIdx]?.classList.add('selected');
      } else {
        avatarContent.textContent = fallbackLetter;
      }
    }

    /* ── USERNAME EDIT ── */
    const usernameDisplay  = document.getElementById('usernameDisplay');
    const usernameEditRow  = document.getElementById('usernameEditRow');
    const usernameInput    = document.getElementById('usernameInput');
    const editUsernameBtn  = document.getElementById('editUsernameBtn');
    const saveUsernameBtn  = document.getElementById('saveUsernameBtn');
    const cancelUsernameBtn= document.getElementById('cancelUsernameBtn');

    editUsernameBtn.addEventListener('click', () => {
      usernameInput.value = usernameDisplay.textContent;
      document.getElementById('usernameRow').style.display = 'none';
      usernameEditRow.classList.add('open');
      usernameInput.focus();
    });
    cancelUsernameBtn.addEventListener('click', () => {
      usernameEditRow.classList.remove('open');
      document.getElementById('usernameRow').style.display = 'flex';
    });

    /* ── COPY SHARE URL ── */
    document.getElementById('copyBtn').addEventListener('click', () => {
      const url = document.getElementById('shareUrl').textContent;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.classList.add('copied'); btn.innerHTML = '<i class="fa-solid fa-check"></i> Copié !';
        setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = '<i class="fa-solid fa-copy"></i> Copier'; }, 2000);
      });
    });

    /* ── SCROLL ── */
    const topBtn = document.getElementById('topBtn');
    topBtn.addEventListener('click', () => window.scrollTo({ top:0, behavior:'smooth' }));
    window.addEventListener('scroll', () => {
      topBtn.classList.toggle('show', window.scrollY > 300);
      document.getElementById('mainHeader').classList.toggle('sticky', window.scrollY > 20);
    });

    document.fonts.ready.then(() => document.body.classList.remove('fonts-not-loaded'));
    window.ANIMES = [];
  </script>

  <script type="module">
    import { initializeApp }  from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCaJZi1Bn1vbeKOC5cM3Gi6nOFyWaH4NK4",
      authDomain: "animehub-7.firebaseapp.com",
      projectId: "animehub-7",
      storageBucket: "animehub-7.firebasestorage.app",
      messagingSenderId: "159114039206",
      appId: "1:159114039206:web:0461d676e7ffff25c4c967"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let userTaste = { topGenres:[], dislikedGenres:[], precision:'normal' };
    let minRating = 6, userLikeYouAnimes = {}, recoMode = 'smart';
    let notesSortMode = 'score-desc', favoritesSortMode = 'title-asc';
    let userData = {}, userRatings = {}, userFavorites = [];

    /* ── Auth ── */
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut(auth); window.location.href = 'auth.html';
    });

    onAuthStateChanged(auth, async user => {
      if (!user) { window.location.href = 'auth.html'; return; }

      // Share URL
      const shareUrl = `${location.origin}${location.pathname.replace('profile.html','')}public-profile.html?uid=${user.uid}`;
      document.getElementById('shareUrl').textContent = shareUrl;

      // Load user doc
      const userRef = doc(db, 'users', user.uid);
      try {
        const snap = await getDoc(userRef);
        if (!snap.exists()) {
          userData = { username: user.email.split('@')[0], email: user.email, favorites: [], ratings: {} };
          await setDoc(userRef, userData);
        } else { userData = snap.data(); }
      } catch(e) { userData = { username: user.email.split('@')[0], email: user.email, favorites: [], ratings: {} }; }

      const name = userData.username || user.email.split('@')[0];
      userRatings   = userData.ratings  || {};
      userFavorites = userData.favorites || [];

      // Display
      document.getElementById('usernameDisplay').textContent = name;
      document.getElementById('profileEmail').textContent = userData.email || user.email;
      document.getElementById('bioText').textContent = userData.bio || 'Aucune bio pour l\'instant.';
      document.getElementById('bioInput').value = userData.bio || '';
      loadAvatarPref(userData.avatar || null, name.charAt(0).toUpperCase());

      // Mettre à jour isOwner et reconstruire le picker
      isOwner = (user.uid === OWNER_UID);
      buildEmojiPicker();

      // Brancher saveAvatarPref sur Firestore maintenant qu'on a userRef
      window._saveAvatarPref = async function() {
        const avatarData = { emoji: selectedEmoji, colorIdx: selectedColorIdx };
        await setDoc(userRef, { avatar: avatarData }, { merge: true });
      };

      // Stats
      const ratedCount = Object.keys(userRatings).length;
      const favCount   = userFavorites.length;
      let avg = '–';
      if (ratedCount > 0) {
        avg = (Object.values(userRatings).reduce((a,b) => a+b, 0) / ratedCount).toFixed(1);
      }
      document.getElementById('statRated').textContent = ratedCount;
      document.getElementById('statFavs').textContent  = favCount;
      document.getElementById('statAvg').textContent   = avg;

      // Save username
      document.getElementById('saveUsernameBtn').addEventListener('click', async () => {
        const newName = document.getElementById('usernameInput').value.trim();
        if (!newName) return;
        await setDoc(userRef, { username: newName }, { merge: true });
        userData.username = newName;
        document.getElementById('usernameDisplay').textContent = newName;
        document.getElementById('usernameEditRow').classList.remove('open');
        document.getElementById('usernameRow').style.display = 'flex';
      });

      // Bio
      document.getElementById('editBioBtn').addEventListener('click', () => {
        document.getElementById('bioEditContainer').style.display = 'block';
        document.getElementById('editBioBtn').style.display = 'none';
      });
      document.getElementById('cancelBioBtn').addEventListener('click', () => {
        document.getElementById('bioInput').value = userData.bio || '';
        document.getElementById('bioEditContainer').style.display = 'none';
        document.getElementById('editBioBtn').style.display = '';
      });
      document.getElementById('saveBioBtn').addEventListener('click', async () => {
        const bio = document.getElementById('bioInput').value.trim();
        await setDoc(userRef, { bio }, { merge: true });
        userData.bio = bio;
        document.getElementById('bioText').textContent = bio || 'Aucune bio pour l\'instant.';
        document.getElementById('bioEditContainer').style.display = 'none';
        document.getElementById('editBioBtn').style.display = '';
      });

      // Load animes
      try {
        const animesSnap = await getDocs(collection(db, 'animes'));
        window.ANIMES = animesSnap.docs.map(d => {
          const data = d.data();
          return {
            id: Number(d.id), title: data.title || '–',
            genre: Array.isArray(data.genre) ? data.genre : [],
            rating: Number.isFinite(data.avgRating) ? data.avgRating : (Number.isFinite(data.anilistScore) ? data.anilistScore/10 : 0),
            avgRating: Number.isFinite(data.avgRating) ? data.avgRating : (Number.isFinite(data.anilistScore) ? data.anilistScore/10 : null),
            year: data.seasonYear || data.year || null,
            img: data.img || 'icon_animehub.png',
            likes: data.likes || 0, fav: false,
            createdAt: data.createdAt || null,
          };
        });
      } catch(e) { console.warn('Animes Firestore indisponibles', e); }

      // Badges
      let badges = userData.badges || [];
      const avgNum = parseFloat(avg) || 0;
      const badgeDefs = [
        { id:'Débutant',       cond: ratedCount === 0 },
        { id:'Anime Addict',   cond: ratedCount >= 10 },
        { id:'Otaku confirmé', cond: ratedCount >= 25 },
        { id:'No Life',        cond: ratedCount >= 50 },
        { id:'Collectionneur', cond: favCount >= 10 },
        { id:'Critique exigeant', cond: avgNum > 0 && avgNum <= 6 },
        { id:'Shonen Master',  cond: avgNum >= 8 },
        { id:'Élite Otaku',    cond: avgNum >= 9 },
      ];
      badgeDefs.forEach(b => { if (b.cond && !badges.includes(b.id)) badges.push(b.id); });
      const badgesWrap = document.getElementById('badgesList');
      badgesWrap.innerHTML = '';
      if (!badges.length) {
        badgesWrap.innerHTML = '<div class="empty-text">Aucun badge pour l\'instant</div>';
      } else {
        badges.forEach(b => {
          const el = document.createElement('div');
          el.className = 'badge'; el.textContent = b;
          badgesWrap.appendChild(el);
        });
      }

      // Badge progress bar
      const nextThreshold = [10,25,50].find(t => ratedCount < t);
      if (nextThreshold) {
        const prevThreshold = nextThreshold === 10 ? 0 : nextThreshold === 25 ? 10 : 25;
        const pct = Math.round(((ratedCount - prevThreshold) / (nextThreshold - prevThreshold)) * 100);
        const labelMap = {10:'Anime Addict',25:'Otaku confirmé',50:'No Life'};
        document.getElementById('badgeProgressWrap').style.display = 'block';
        document.getElementById('badgeProgressLabel').textContent = `Prochain : ${labelMap[nextThreshold]}`;
        document.getElementById('badgeProgressValue').textContent = `${ratedCount} / ${nextThreshold}`;
        setTimeout(() => { document.getElementById('badgeProgressFill').style.width = pct + '%'; }, 200);
      }

      await setDoc(userRef, { badges }, { merge: true });

      // Taste profile
      const genreStats = {};
      Object.entries(userRatings).forEach(([id, note]) => {
        const anime = window.ANIMES.find(a => a.id === parseInt(id));
        if (!anime) return;
        anime.genre.forEach(g => {
          if (!genreStats[g]) genreStats[g] = 0;
          genreStats[g] += note >= 8 ? 10 : note >= 6 ? 5 : -6;
        });
      });
      userFavorites.forEach(id => {
        const anime = window.ANIMES.find(a => a.id === id);
        if (!anime) return;
        anime.genre.forEach(g => { if (!genreStats[g]) genreStats[g]=0; genreStats[g]+=12; });
      });
      const sorted = Object.entries(genreStats).sort((a,b) => b[1]-a[1]);
      userTaste.topGenres     = sorted.filter(([,s]) => s>0).slice(0,3).map(([g])=>g);
      userTaste.dislikedGenres= sorted.filter(([,s]) => s<-5).map(([g])=>g);
      userTaste.precision     = avgNum >= 8.5 ? 'exigeant' : avgNum <= 6 ? 'large' : 'normal';
      minRating = userTaste.precision === 'exigeant' ? 7.5 : userTaste.precision === 'large' ? 5.5 : 6;

      // Similar users
      let usersDocs = [];
      try { const s = await getDocs(collection(db,'users')); usersDocs = s.docs; } catch(e) {}
      userLikeYouAnimes = {};
      usersDocs.forEach(d => {
        if (d.id === user.uid) return;
        const other = d.data(); if (!other.ratings) return;
        let score = 0, common = 0;
        Object.entries(userRatings).forEach(([id,note]) => { if (other.ratings[id]) { score += 10-Math.abs(note-other.ratings[id]); common++; } });
        if (common < 3 || score < 20) return;
        Object.entries(other.ratings||{}).forEach(([id,note]) => { if (note>=8 && !userRatings[id] && !userFavorites.includes(parseInt(id))) userLikeYouAnimes[parseInt(id)] = (userLikeYouAnimes[parseInt(id)]||0)+score; });
        (other.favorites||[]).forEach(id => { if (!userRatings[id] && !userFavorites.includes(id)) userLikeYouAnimes[id] = (userLikeYouAnimes[id]||0)+15; });
      });

      renderProfileLists();
      renderRecommendations();
      await loadActivity(user.uid, userData);

      // Reco mode buttons
      document.querySelectorAll('.reco-mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.reco-mode-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          recoMode = btn.dataset.mode;
          renderRecommendations();
        });
      });

      // Sort listeners
      document.getElementById('notesSort').addEventListener('change', e => { notesSortMode = e.target.value; renderProfileLists(); });
      document.getElementById('favoritesSort').addEventListener('change', e => { favoritesSortMode = e.target.value; renderProfileLists(); });
    });

    /* ── Render lists ── */
    function renderProfileLists() {
      // Notes
      const ratedListEl = document.getElementById('ratedList');
      ratedListEl.innerHTML = '';
      const entries = Object.entries(userRatings);
      if (!entries.length) {
        ratedListEl.innerHTML = '<div class="empty-text">Aucune note pour l\'instant</div>';
      } else {
        sortEntries(entries).forEach(([id, score], i) => {
          const anime = window.ANIMES.find(a => a.id == id); if (!anime) return;
          const item = makeRatedItem(anime.title, score, '⭐', anime.id, i);
          ratedListEl.appendChild(item);
        });
      }

      // Favoris
      const favListEl = document.getElementById('favoritesList');
      favListEl.innerHTML = '';
      if (!userFavorites.length) {
        favListEl.innerHTML = '<div class="empty-text">Aucun favori pour l\'instant</div>';
      } else {
        sortFavs([...userFavorites]).forEach((id, i) => {
          const anime = window.ANIMES.find(a => a.id == id); if (!anime) return;
          const item = makeRatedItem(anime.title, '❤️', null, anime.id, i);
          favListEl.appendChild(item);
        });
      }
    }

    function makeRatedItem(title, score, _unused, animeId, delay) {
      const item = document.createElement('div');
      item.className = 'rated-item';
      item.style.animationDelay = `${delay * 0.05}s`;
      item.innerHTML = `
        <div class="rated-title">${title}</div>
        <div class="rated-right">
          <div class="rated-score">${score}</div>
          <button class="rated-btn">Voir</button>
        </div>`;
      item.querySelector('.rated-btn').addEventListener('click', () => location.href=`anime.html?id=${animeId}`);
      return item;
    }

    function sortEntries(entries) {
      if (notesSortMode === 'score-asc')  return [...entries].sort((a,b) => a[1]-b[1]);
      if (notesSortMode === 'title-asc')  return [...entries].sort((a,b) => (window.ANIMES.find(x=>x.id==a[0])?.title||'').localeCompare(window.ANIMES.find(x=>x.id==b[0])?.title||''));
      return [...entries].sort((a,b) => b[1]-a[1]);
    }
    function sortFavs(ids) {
      return ids.sort((a,b) => {
        const ta = window.ANIMES.find(x=>x.id==a)?.title||'', tb = window.ANIMES.find(x=>x.id==b)?.title||'';
        return favoritesSortMode === 'title-desc' ? tb.localeCompare(ta) : ta.localeCompare(tb);
      });
    }

    /* ── Render recos (logique intacte) ── */
    function renderRecommendations() {
      const recoListEl = document.getElementById('recoList');
      recoListEl.innerHTML = '';
      const excluded = [...Object.keys(userRatings).map(Number), ...userFavorites];
      if (!window.ANIMES.length) { recoListEl.innerHTML = '<div class="empty-text">Aucune donnée disponible.</div>'; return; }

      const recoAnimes = window.ANIMES
        .filter(a => !excluded.includes(a.id) && (a.rating||0) >= minRating)
        .map(a => {
          let score = 0; const reasons = [];
          a.genre.forEach(g => {
            if (userTaste.topGenres.includes(g)) { score += 18; reasons.push(`Tu aimes le genre ${g}`); }
            if (userTaste.dislikedGenres.includes(g)) score -= 30;
          });
          if (userLikeYouAnimes[a.id]) { score += Math.min(userLikeYouAnimes[a.id]/5,25); reasons.push('Apprécié par des utilisateurs similaires'); }
          if ((a.avgRating||0) >= 8) reasons.push(`Très bien noté (${a.avgRating?.toFixed(1)})`);
          score += (a.rating||0) * 0.6;
          return { ...a, score, reasons };
        })
        .filter(a => !a.genre.some(g => userTaste.dislikedGenres.includes(g)))
        .sort((a,b) => b.score-a.score);

      const mainReco = recoAnimes.filter(a => a.genre.some(g => userTaste.topGenres.includes(g)));
      const diversityReco = recoAnimes.filter(a => !a.genre.some(g => userTaste.topGenres.includes(g)) && (a.rating||0) >= minRating+0.3);
      const LIMIT = 6;
      const DIVERSITY = recoMode==='explore' ? 4 : recoMode==='safe' ? 1 : 2;
      const final = [...mainReco.slice(0, LIMIT-DIVERSITY), ...diversityReco.slice(0, DIVERSITY)];
      if (!final.length) { recoListEl.innerHTML = '<div class="empty-text">Pas encore assez de données pour des suggestions.</div>'; return; }

      final.slice(0, LIMIT).forEach((a, i) => {
        const isDiscovery = !a.genre.some(g => userTaste.topGenres.includes(g));
        const item = document.createElement('div');
        item.className = 'rated-item';
        item.style.animationDelay = `${i * 0.05}s`;
        item.innerHTML = `
          <div class="rated-title">
            ${a.title}
            ${isDiscovery ? '<span class="tag">Découverte</span>' : ''}
            <div class="reco-reasons">${(a.reasons||[]).slice(0,2).map(r=>`<span class="reco-reason">${r}</span>`).join('')}</div>
          </div>
          <div class="rated-right">
            <div class="rated-score">${a.avgRating?.toFixed(1)??'–'}</div>
            <button class="rated-btn">Voir</button>
          </div>`;
        item.querySelector('.rated-btn').addEventListener('click', () => location.href=`anime.html?id=${a.id}`);
        recoListEl.appendChild(item);
      });
    }

    /* ── Activité récente ── */
    async function loadActivity(uid, userData) {
      const el = document.getElementById('activityList');
      if (!el) return;
      const STATUS_LABELS = { watching:'▶️ En cours', completed:'✅ Terminé', planned:'🕒 À voir' };
      const events = [];

      // Notifs (favoris + notes)
      try {
        const q = query(collection(db,'notifications'), where('userId','==',uid), orderBy('createdAt','desc'), limit(20));
        const snap = await getDocs(q);
        snap.docs.forEach(d => {
          const n = d.data();
          events.push({
            type: n.message?.includes('favori') ? 'fav' : 'rating',
            message: n.message || '',
            createdAt: n.createdAt?.toDate?.() || new Date(n.createdAt),
          });
        });
      } catch(e) { console.warn('Notifs activité:', e); }

      // Changements de statut
      (userData.recentActivity || []).filter(a => a.type==='status').forEach(a => {
        events.push({ type:'status', animeId:a.animeId, animeTitle:a.animeTitle, animeImg:a.animeImg, statusLabel:STATUS_LABELS[a.status]||a.statusLabel, createdAt:new Date(a.createdAt) });
      });

      events.sort((a,b) => b.createdAt - a.createdAt);
      const top5 = events.slice(0,5);
      el.innerHTML = '';

      if (!top5.length) {
        el.innerHTML = '<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px;">Aucune activité récente</div>';
        return;
      }

      // Map animes pour images/ids
      const animesMap = {};
      try { const s = await getDocs(collection(db,'animes')); s.docs.forEach(d => { animesMap[Number(d.id)] = d.data(); }); } catch(e) {}

      top5.forEach(ev => {
        const item = document.createElement('div');
        item.className = 'activity-item';
        let icon, label, animeTitle='', animeImg='icon_animehub.png', animeId=null;

        if (ev.type==='fav') {
          icon='❤️'; label='Ajouté aux favoris';
          const m = ev.message.match(/ajouté (.+?) à tes favoris/);
          animeTitle = m ? m[1] : ev.message;
          const found = Object.entries(animesMap).find(([,d]) => d.title===animeTitle);
          if (found) { animeImg=found[1].img||animeImg; animeId=Number(found[0]); }
        } else if (ev.type==='rating') {
          icon='⭐'; label='Anime noté';
          const m = ev.message.match(/noté (.+?) /);
          animeTitle = m ? m[1] : ev.message;
          const found = Object.entries(animesMap).find(([,d]) => d.title===animeTitle);
          if (found) { animeImg=found[1].img||animeImg; animeId=Number(found[0]); }
        } else {
          icon='📋'; animeTitle=ev.animeTitle; animeImg=ev.animeImg||animeImg; label=ev.statusLabel; animeId=ev.animeId;
        }

        if (animeId) item.addEventListener('click', () => location.href=`anime.html?id=${animeId}`);
        item.innerHTML = `
          <span class="activity-icon">${icon}</span>
          <img class="activity-poster" src="${animeImg}" alt="${animeTitle}" loading="lazy">
          <div class="activity-info">
            <div class="activity-title">${animeTitle}</div>
            <div class="activity-sub">${label}</div>
          </div>
          <div class="activity-time">${formatTimeAgo(ev.createdAt)}</div>`;
        el.appendChild(item);
      });
    }

    function formatTimeAgo(date) {
      const diff = Math.floor((Date.now() - date.getTime()) / 1000);
      if (diff < 60)    return "À l'instant";
      if (diff < 3600)  return `Il y a ${Math.floor(diff/60)} min`;
      if (diff < 86400) return `Il y a ${Math.floor(diff/3600)} h`;
      if (diff < 604800) return `Il y a ${Math.floor(diff/86400)} j`;
      return date.toLocaleDateString('fr-FR', { day:'numeric', month:'short' });
    }

  </script>
