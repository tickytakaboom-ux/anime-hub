  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap');

    :root {
      --bg:#0b1220; --bg2:#061226;
      --card:rgba(13,22,40,0.88); --card-border:rgba(255,255,255,0.07);
      --accent:#06b6d4; --accent2:#3b82f6;
      --muted:#7e8fa8; --text:#e6eef6; --radius:16px;
      --good:#22c55e; --bad:#ef4444;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', ui-sans-serif, system-ui;
      background: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 100%);
      color: var(--text); min-height: 100vh;
      -webkit-font-smoothing: antialiased; overflow-x: hidden;
      display: flex; flex-direction: column;
    }

    canvas { position: fixed; top:0; left:0; z-index:0; opacity:.3; pointer-events:none; }

    /* ── HEADER ── */
    header {
      position: sticky; top:0; z-index:100;
      background: rgba(11,18,32,.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--card-border);
      padding: 14px 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo-text {
      font-family: 'Mochiy Pop One','Syne',sans-serif; font-size:1.4rem; cursor:pointer;
      background: linear-gradient(90deg,#fff59d,#ffeb3b,#ff9800,#ff5722);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .hbtn {
      padding: 8px 14px; border-radius:10px;
      border: 1px solid var(--card-border); background: rgba(255,255,255,.05);
      color: var(--text); font-family:inherit; font-size:13px; font-weight:700;
      cursor:pointer; transition: background .2s, border-color .2s, transform .15s;
      display:flex; align-items:center; gap:6px; text-decoration:none;
    }
    .hbtn:hover { background: rgba(6,182,212,.1); border-color: rgba(6,182,212,.4); transform: translateY(-1px); }

    /* ── PAGE ── */
    .page {
      position:relative; z-index:1; flex:1;
      display:flex; align-items:center; justify-content:center;
      padding: 32px 20px 60px;
    }

    /* ── CARD ── */
    .card {
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: var(--radius); padding: 28px 26px;
      backdrop-filter: blur(10px);
      box-shadow: 0 16px 48px rgba(0,0,0,.5);
      width: 100%; max-width: 520px;
      animation: fadeUp .45s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

    /* ── PROGRESS ── */
    .progress-wrap { margin-bottom: 18px; }
    .progress-info {
      display:flex; justify-content:space-between; align-items:center;
      font-size:12px; color:var(--muted); font-weight:700; margin-bottom:8px;
      text-transform:uppercase; letter-spacing:.04em;
    }
    .progress-bar-bg { height:5px; border-radius:999px; background:rgba(255,255,255,.07); overflow:hidden; }
    .progress-bar-fill {
      height:100%; border-radius:999px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .5s ease;
    }

    /* ── SCORE ROW ── */
    .score-row { display:flex; gap:10px; margin-bottom:18px; }
    .score-chip {
      flex:1; padding:9px 10px; border-radius:12px; text-align:center;
      background: rgba(255,255,255,.04); border: 1px solid var(--card-border);
    }
    .score-chip-value { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:900; color:var(--accent); }
    .score-chip-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-top:2px; }

    /* ── QUESTION ── */
    .question-box {
      background: rgba(6,182,212,.07); border: 1px solid rgba(6,182,212,.2);
      border-radius:14px; padding:18px 16px; text-align:center;
      margin-bottom:18px; min-height:70px;
      display:flex; align-items:center; justify-content:center;
    }
    .question-text { font-family:'Syne',sans-serif; font-size:1.05rem; font-weight:700; line-height:1.4; }

    /* ── ANSWERS ── */
    .answers { display:flex; flex-direction:column; gap:9px; }
    .answer {
      padding: 13px 16px; border-radius:12px;
      background: rgba(255,255,255,.04); border: 1px solid var(--card-border);
      cursor:pointer; font-size:14px; font-weight:500;
      transition: background .15s, border-color .15s, transform .15s;
      display:flex; align-items:center; gap:10px;
    }
    .answer-letter {
      width:26px; height:26px; border-radius:8px; flex-shrink:0;
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
      display:flex; align-items:center; justify-content:center;
      font-family:'Syne',sans-serif; font-size:12px; font-weight:900;
      color:var(--muted); transition: background .15s, color .15s;
    }
    .answer:hover:not(.disabled) { background: rgba(6,182,212,.08); border-color: rgba(6,182,212,.3); transform: translateX(3px); }
    .answer:hover:not(.disabled) .answer-letter { background: rgba(6,182,212,.2); color: var(--accent); }

    .answer.good { background: rgba(34,197,94,.1); border-color: var(--good); }
    .answer.good .answer-letter { background: rgba(34,197,94,.2); color: var(--good); border-color: var(--good); }
    .answer.bad  { background: rgba(239,68,68,.1);  border-color: var(--bad);  }
    .answer.bad  .answer-letter { background: rgba(239,68,68,.2);  color: var(--bad);  border-color: var(--bad); }
    .answer.disabled { pointer-events:none; opacity:.65; }

    /* ── NEXT BTN ── */
    .next-btn {
      margin-top:16px; width:100%; padding:13px; border-radius:12px; border:none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color:#052226; font-family:inherit; font-size:15px; font-weight:700;
      cursor:pointer; display:none;
      transition: transform .15s, filter .15s, box-shadow .15s;
      box-shadow: 0 4px 16px rgba(6,182,212,.3);
    }
    .next-btn:hover { transform: translateY(-2px); filter:brightness(1.05); box-shadow: 0 8px 24px rgba(6,182,212,.45); }

    /* ── RESULT ── */
    .result-box { text-align:center; animation: fadeUp .4s ease both; }
    .result-emoji { font-size:3rem; margin-bottom:12px; display:block; }
    .result-title { font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:900; margin-bottom:8px; }
    .result-sub { font-size:14px; color:var(--muted); margin-bottom:20px; }
    .result-stats { display:flex; gap:10px; margin-bottom:24px; }
    .result-stat { flex:1; padding:12px; border-radius:12px; text-align:center; background:rgba(255,255,255,.04); border:1px solid var(--card-border); }
    .result-stat-value { font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:900; color:var(--accent); }
    .result-stat-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-top:3px; }
    .result-btns { display:flex; flex-direction:column; gap:8px; }
    .btn-primary {
      padding:12px; border-radius:12px; border:none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color:#052226; font-family:inherit; font-size:14px; font-weight:700;
      cursor:pointer; transition: transform .15s, filter .15s;
    }
    .btn-primary:hover { transform:translateY(-2px); filter:brightness(1.05); }
    .btn-ghost {
      padding:12px; border-radius:12px;
      border:1px solid var(--card-border); background:transparent;
      color:var(--muted); font-family:inherit; font-size:14px; font-weight:700;
      cursor:pointer; transition: background .2s, color .2s;
    }
    .btn-ghost:hover { background:rgba(255,255,255,.06); color:var(--text); }
    .saving { font-size:12px; color:var(--muted); text-align:center; margin-top:10px; display:flex; align-items:center; justify-content:center; gap:6px; }
    .saving i { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── ERROR ── */
    .error-state { text-align:center; padding:40px 20px; }
    .error-state h2 { font-family:'Syne',sans-serif; font-size:1.3rem; margin-bottom:8px; }
    .error-state p { color:var(--muted); font-size:14px; margin-bottom:20px; }

    @media (max-width:500px) {
      body { overflow-x:hidden; }
      header { padding:10px 14px; }
      .page { padding:20px 12px 60px; max-width:100vw; }
      .card { padding:18px 14px; min-width:0; max-width:100%; }
      .question-text { font-size:1rem; }
      .answer-btn { padding:10px 12px; font-size:13px; }
      .answer-letter { width:24px; height:24px; font-size:11px; }
      .chips { gap:6px; }
      .chip { padding:5px 10px; font-size:12px; }
      .progress-bar-wrap { margin-bottom:12px; }
    }

    @font-face {
      font-family:'Mochiy Pop One';
      src:url('MochiyPopOne-Regular.woff2') format('woff2');
      font-display:swap;
    }
  </style>

  <script>
    /* ── Particles ── */
    const canvas=document.getElementById('stars'),ctx=canvas.getContext('2d');
    let w,h,pts;
    function resize(){w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight;}
    function init(){pts=Array.from({length:60},()=>({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.3+.3,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3}));}
    function draw(){
      ctx.clearRect(0,0,w,h);
      for(const p of pts){p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>w)p.dx*=-1;if(p.y<0||p.y>h)p.dy*=-1;}
      for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const a=pts[i],b=pts[j],d=Math.hypot(a.x-b.x,a.y-b.y);if(d<115){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(34,211,238,${(1-d/115)*.22})`;ctx.lineWidth=.6;ctx.stroke();}}
      for(const p of pts){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(200,240,255,.75)';ctx.fill();}
      requestAnimationFrame(draw);
    }
    resize();init();draw();
    window.addEventListener('resize',()=>{resize();init();});
    document.getElementById('homeLogo').addEventListener('click',()=>location.href='index.html');
  </script>

    /* ══════════════════════════════════════════
       INIT

    const params  = new URLSearchParams(window.location.search);
    const quizId  = params.get('quiz')  || 'general';
    const group   = params.get('group') || 'qcu';
    const card    = document.getElementById('quizCard');

    const questions = quizzes[quizId];
    const LETTERS   = ['A','B','C','D'];

    if (!questions || !questions.length) {
      card.innerHTML = `
        <div class="error-state">
          <h2>Quiz introuvable 😢</h2>
          <p>Ce quiz n'existe pas encore.</p>
          <button class="btn-primary" onclick="location.href='animequiz.html'">← Retour</button>
        </div>`;
    } else {
      runQuiz(questions);
    }

    function runQuiz(qs) {
      const TOTAL   = qs.length;
      let current   = 0;
      let score     = 0;
      let correct   = 0;
      let streak    = 0;

      function updateProgress() {
        const pct = Math.round((current / TOTAL) * 100);
        document.getElementById('progressText').textContent = `Question ${current + 1} / ${TOTAL}`;
        document.getElementById('progressPct').textContent  = `${pct}%`;
        document.getElementById('progressFill').style.width = `${pct}%`;
      }

      function renderQuestion() {
        const q = qs[current];
        document.getElementById('questionText').textContent = q.question;
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('scoreVal').textContent  = score;
        document.getElementById('streakVal').textContent = `${streak}🔥`;
        document.getElementById('correctVal').textContent = correct;
        updateProgress();

        const answersEl = document.getElementById('answersEl');
        answersEl.innerHTML = '';
        q.answers.forEach((text, i) => {
          const div = document.createElement('div');
          div.className = 'answer';
          div.innerHTML = `<div class="answer-letter">${LETTERS[i]}</div><span>${text}</span>`;
          div.addEventListener('click', () => selectAnswer(div, i));
          answersEl.appendChild(div);
        });
      }

      function selectAnswer(el, index) {
        const correctIndex = qs[current].correct;
        const allAnswers   = document.querySelectorAll('.answer');
        allAnswers.forEach(a => a.classList.add('disabled'));

        if (index === correctIndex) {
          el.classList.add('good');
          streak++;
          correct++;
          const bonus = streak >= 5 ? 5 : streak >= 3 ? 2 : 0;
          score += 10 + bonus;
        } else {
          el.classList.add('bad');
          allAnswers[correctIndex].classList.add('good');
          streak = 0;
        }

        document.getElementById('scoreVal').textContent   = score;
        document.getElementById('streakVal').textContent  = `${streak}🔥`;
        document.getElementById('correctVal').textContent = correct;
        document.getElementById('nextBtn').style.display  = 'block';
      }

      /* ── Rendu de la structure ── */
      card.innerHTML = `
        <div class="progress-wrap">
          <div class="progress-info">
            <span id="progressText">Question 1 / ${TOTAL}</span>
            <span id="progressPct">0%</span>
          </div>
          <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
        </div>
        <div class="score-row">
          <div class="score-chip"><div class="score-chip-value" id="scoreVal">0</div><div class="score-chip-label">Score</div></div>
          <div class="score-chip"><div class="score-chip-value" id="streakVal">0🔥</div><div class="score-chip-label">Série</div></div>
          <div class="score-chip"><div class="score-chip-value" id="correctVal">0</div><div class="score-chip-label">Corrects</div></div>
        </div>
        <div class="question-box"><div class="question-text" id="questionText"></div></div>
        <div class="answers" id="answersEl"></div>
        <button class="next-btn" id="nextBtn">Question suivante →</button>`;

      document.getElementById('nextBtn').addEventListener('click', () => {
        current++;
        if (current < TOTAL) {
          renderQuestion();
        } else {
          showResult(score, correct, TOTAL);
        }
      });

      renderQuestion();
    }

    /* ── Sauvegarde Firestore ── */
    async function saveStats(score, correct, total) {
      if (!currentUser) return;
      const userRef = doc(db, 'users', currentUser.uid);
      try {
        const snap = await getDoc(userRef);
        const data = snap.data() || {};
        const prevBest    = data.quizStats?.bestScore                       ?? 0;
        const prevCatBest = data.quizStats?.byCategory?.[group]?.bestScore  ?? 0;

        const updates = {
          'quizStats.totalPlayed':                              increment(1),
          'quizStats.totalCorrect':                            increment(correct),
          'quizStats.totalAnswered':                           increment(total),
          [`quizStats.byCategory.${group}.played`]:           increment(1),
          [`quizStats.byCategory.${group}.totalCorrect`]:     increment(correct),
          [`quizStats.byCategory.${group}.totalAnswered`]:    increment(total),
        };
        if (score > prevBest)    updates['quizStats.bestScore'] = score;
        if (score > prevCatBest) updates[`quizStats.byCategory.${group}.bestScore`] = score;

        await updateDoc(userRef, updates);
      } catch(e) {
        await setDoc(userRef, {
          quizStats: {
            totalPlayed:1, totalCorrect:correct, totalAnswered:total, bestScore:score,
            byCategory: { [group]:{ played:1, totalCorrect:correct, totalAnswered:total, bestScore:score } }
          }
        }, { merge:true });
      }
    }

    /* ── Écran résultat ── */
    async function showResult(score, correct, total) {
      const accuracy = Math.round((correct / total) * 100);
      const emoji = accuracy===100?'🏆':accuracy>=70?'🎉':accuracy>=40?'😤':'💀';
      const title = accuracy===100?'Parfait !':accuracy>=70?'Bien joué !':accuracy>=40?'Pas mal…':'Retente ta chance';
      const sub   = accuracy===100?'Tu as tout trouvé, respect !':`${correct} bonne${correct>1?'s':''} réponse${correct>1?'s':''} sur ${total}`;

      card.innerHTML = `
        <div class="result-box">
          <span class="result-emoji">${emoji}</span>
          <div class="result-title">${title}</div>
          <div class="result-sub">${sub}</div>
          <div class="result-stats">
            <div class="result-stat"><div class="result-stat-value">${score}</div><div class="result-stat-label">Score</div></div>
            <div class="result-stat"><div class="result-stat-value">${accuracy}%</div><div class="result-stat-label">Précision</div></div>
            <div class="result-stat"><div class="result-stat-value">${correct}/${total}</div><div class="result-stat-label">Corrects</div></div>
          </div>
          <div class="result-btns">
            <button class="btn-primary" onclick="location.reload()">🔄 Rejouer</button>
            <button class="btn-ghost" onclick="location.href='select.html?group=${group}'">← Autres quiz</button>
          </div>
          <div class="saving" id="savingIndicator">
            <i class="fa-solid fa-circle-notch"></i> Sauvegarde en cours…
          </div>
        </div>`;

      await saveStats(score, correct, total);
      const si = document.getElementById('savingIndicator');
      if (si) si.innerHTML = '<i class="fa-solid fa-check" style="color:#4ade80"></i> Score sauvegardé !';
    }
  </script>
